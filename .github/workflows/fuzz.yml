name: Apple Fuzzing

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  CC: /opt/homebrew/opt/llvm/bin/clang
  SANFLAGS: -g -O1 -fsanitize=fuzzer,address

jobs:
  fuzz-imageio-thumbnail:
    runs-on: macos-14
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - run: brew install llvm 2>&1 | tail -3
      - name: Build
        run: $CC $SANFLAGS -framework Foundation -framework ImageIO -framework CoreGraphics -o fuzz harnesses/imageio_thumbnail.m
      - name: Fuzz (5 hours)
        run: |
          mkdir -p findings
          ./fuzz -max_total_time=18000 -max_len=65536 -timeout=10 -rss_limit_mb=4096 -dict=dictionaries/imageio.dict -artifact_prefix=findings/ -print_final_stats=1 corpus/seeds/ 2>&1 | tee fuzz.log || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: thumbnail-${{ github.run_number }}
          path: |
            findings/
            fuzz.log
          if-no-files-found: ignore

  fuzz-imageio-generic:
