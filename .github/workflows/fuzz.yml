name: Apple Fuzzing

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fuzz-imageio-thumbnail:
    runs-on: macos-14
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - name: Setup LLVM
        run: |
          brew install llvm 2>&1 | tail -3
          LLVM=/opt/homebrew/opt/llvm
          echo "LLVM=$LLVM" >> $GITHUB_ENV
          # Find the fuzzer lib
          FUZZER_LIB=$(find $LLVM -name 'libclang_rt.fuzzer_osx.a' | head -1)
          echo "FUZZER_LIB=$FUZZER_LIB" >> $GITHUB_ENV
          echo "Found fuzzer lib: $FUZZER_LIB"
      - name: Build
        run: |
          # Step 1: Compile .o with Homebrew LLVM (has fuzzer instrumentation)
          $LLVM/bin/clang -c -g -O1 -fsanitize=fuzzer,address \
            -o fuzz.o harnesses/imageio_thumbnail.m
          # Step 2: Link with Apple's clang (compatible linker) + Homebrew's fuzzer lib
          xcrun clang -g -O1 -fsanitize=address \
            -framework Foundation -framework ImageIO -framework CoreGraphics \
            -lstdc++ \
            -o fuzz fuzz.o "$FUZZER_LIB"
      - name: Fuzz (5 hours)
        run: |
          mkdir -p findings
          ./fuzz -max_total_time=18000 -max_len=65536 -timeout=10 -rss_limit_mb=4096 \
            -dict=dictionaries/imageio.dict -artifact_prefix=findings/ \
            -print_final_stats=1 corpus/seeds/ 2>&1 | tee fuzz.log || true
      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: thumbnail-${{ github.run_number }}
          path: |
            findings/
            fuzz.log
          if-no-files-found: ignore

