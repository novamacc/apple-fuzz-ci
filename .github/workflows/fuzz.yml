name: Apple Fuzzing

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fuzz-imageio-thumbnail:
    runs-on: macos-14
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - name: Build harness
        run: |
          # Use Apple Clang with system libfuzzer archive
          LIBFUZZER=$(find /Library/Developer/CommandLineTools -name 'libclang_rt.fuzzer_osx.a' 2>/dev/null | head -1)
          if [ -z "$LIBFUZZER" ]; then
            LIBFUZZER=$(find /Applications/Xcode* -name 'libclang_rt.fuzzer_osx.a' 2>/dev/null | head -1)
          fi
          echo "Using libfuzzer: $LIBFUZZER"
          clang -g -O1 -fsanitize=address,undefined \
            -framework Foundation -framework ImageIO -framework CoreGraphics \
            -o fuzz_imageio_thumbnail harnesses/imageio_thumbnail.m "$LIBFUZZER"
      - name: Fuzz (5 hours)
        run: |
          mkdir -p findings
          ./fuzz_imageio_thumbnail \
            -max_total_time=18000 -max_len=65536 -timeout=10 -rss_limit_mb=4096 \
            -dict=dictionaries/imageio.dict -artifact_prefix=findings/ \
            -print_final_stats=1 corpus/seeds/ 2>&1 | tee fuzz.log || true
      - name: Upload crashes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: thumbnail-${{ github.run_number }}
          path: |
            findings/
            fuzz.log
          if-no-files-found: ignore

