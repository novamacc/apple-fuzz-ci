name: Apple Fuzzing

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fuzz-imageio-thumbnail:
    runs-on: macos-14
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - name: Setup fuzzer toolchain
        id: setup
        run: |
          echo "=== System clang ==="
          clang --version
          echo "=== Xcode path ==="
          xcode-select -p
          echo "=== Find libfuzzer ==="
          find /Applications/Xcode* /Library/Developer -name 'libclang_rt.fuzzer_osx.a' 2>/dev/null || true
          find /Applications/Xcode* /Library/Developer -name 'libclang_rt.fuzzer_*' 2>/dev/null || true
          echo "=== Try Homebrew LLVM ==="
          brew install llvm 2>&1 | tail -5
          ls /opt/homebrew/opt/llvm/lib/clang/*/lib/darwin/libclang_rt.fuzzer_osx.a 2>/dev/null || true
          echo "=== Homebrew clang version ==="
          /opt/homebrew/opt/llvm/bin/clang --version 2>/dev/null || true
      - name: Build harness
        run: |
          # Homebrew LLVM with its own linker (not Apple ld)
          export PATH="/opt/homebrew/opt/llvm/bin:$PATH"
          export LDFLAGS="-L/opt/homebrew/opt/llvm/lib -fuse-ld=lld"
          clang -g -O1 -fsanitize=fuzzer,address,undefined \
            -fuse-ld=lld \
            -framework Foundation -framework ImageIO -framework CoreGraphics \
            -o fuzz_imageio_thumbnail harnesses/imageio_thumbnail.m
      - name: Fuzz (5 hours)
        run: |
          mkdir -p findings
          ./fuzz_imageio_thumbnail \
            -max_total_time=18000 -max_len=65536 -timeout=10 -rss_limit_mb=4096 \
            -dict=dictionaries/imageio.dict -artifact_prefix=findings/ \
            -print_final_stats=1 corpus/seeds/ 2>&1 | tee fuzz.log || true
      - name: Upload crashes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: thumbnail-${{ github.run_number }}
          path: |
            findings/
            fuzz.log
          if-no-files-found: ignore

  fuzz-imageio-generic:
    runs-on: macos-14
    timeout-minutes: 350
