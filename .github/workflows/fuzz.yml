name: Apple Fuzzing

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fuzz-imageio-thumbnail:
    runs-on: macos-14
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - name: Setup LLVM
        run: |
          brew install llvm 2>&1 | tail -5
          LLVM=/opt/homebrew/opt/llvm
          echo "=== All clang_rt libs ==="
          find $LLVM -name 'libclang_rt.*' -type f 2>/dev/null
          echo "=== All fuzzer files ==="
          find $LLVM -name '*fuzzer*' -type f 2>/dev/null
          echo "=== Xcode clang_rt libs ==="
          find /Applications/Xcode* -name 'libclang_rt.fuzzer*' -type f 2>/dev/null
          find /Library/Developer -name 'libclang_rt.fuzzer*' -type f 2>/dev/null
          echo "=== LLVM version ==="
          $LLVM/bin/clang --version | head -2
          echo "=== Try direct compile+link in one step ==="
          echo 'int LLVMFuzzerTestOneInput(const unsigned char *d, long s) { return 0; }' > /tmp/test.c
          $LLVM/bin/clang -fsanitize=fuzzer,address -o /tmp/test_fuzz /tmp/test.c 2>&1 && echo "DIRECT BUILD WORKS" || echo "DIRECT BUILD FAILED"
          echo "=== Try xcrun clang ==="
          xcrun clang --version | head -2
